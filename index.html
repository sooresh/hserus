<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hserus</title>
    <!-- Puter.js Cloud Engine Engine (Bypasses CORS Client-Side) -->
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0b0f19; color: #e2e8f0; padding: 12px; }
        .wrapper { max-width: 100%; margin: 0 auto; }
        
        /* Mobile Optimized Header */
        header { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #1e293b; }
        h1 { font-size: 20px; color: #38bdf8; text-align: center; }
        
        .controls { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        select, button { background-color: #1e293b; color: #fff; border: 1px solid #334155; padding: 10px 14px; border-radius: 8px; font-size: 14px; flex-grow: 1; -webkit-appearance: none; }
        button { background-color: #0284c7; border: none; font-weight: bold; cursor: pointer; flex-grow: 2; }
        button:active { background-color: #0369a1; }
        
        /* Card-based Mobile Table Container */
        .table-wrap { background-color: #111827; border-radius: 10px; overflow-x: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid #1e293b; }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 600px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #1e293b; font-size: 13px; text-align: center; }
        th { background-color: #0f172a; color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        
        /* Typography Highlights */
        .bullish { color: #4ade80; font-weight: bold; }
        .bearish { color: #f87171; font-weight: bold; }
        .neutral { color: #94a3b8; }
        .atm-strike { background-color: #1e293b; border-radius: 4px; padding: 2px 6px; font-weight: bold; color: #f59e0b; }
        
        /* System Log Tracker */
        .status { margin-top: 10px; font-size: 11px; color: #64748b; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>hserus</h1>
        <div class="controls">
            <select id="intervalSelect">
                <option value="2">2 Min Loop</option>
                <option value="5" selected>5 Min Loop</option>
                <option value="15">15 Min Loop</option>
            </select>
            <button id="triggerFetch">Fetch Live Data</button>
        </div>
    </header>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Spot</th>
                    <th>ATM Strike</th>
                    <th>CE Price</th>
                    <th>PE Price</th>
                    <th>CE OI Chg</th>
                    <th>PE OI Chg</th>
                    <th>Net Chg</th>
                    <th>Market Bias</th>
                </tr>
            </thead>
            <tbody id="trackerLogs">
                <!-- Live data rows insert here -->
            </tbody>
        </table>
    </div>
    <div class="status" id="systemState">System initialized. Waiting for prompt trigger...</div>
</div>

<script>
    let historicalSnapshot = null;
    let backgroundLoop = null;

    document.getElementById('triggerFetch').addEventListener('click', executeScannerPipeline);
    document.getElementById('intervalSelect').addEventListener('change', coordinateExecutionIntervals);

    async function executeScannerPipeline() {
        const logger = document.getElementById('systemState');
        logger.textContent = "Connecting to NSE servers via Cloud Stream Layer...";
        
        try {
            // Puter.js establishes proxy tunnel executing native TLS requests securely
            const response = await puter.net.fetch("https://www.nseindia.com/api/option-chain-indices?symbol=NIFTY");
            if (!response.ok) throw new Error(`HTTP Session Error! Status: ${response.status}`);
            
            const payload = await response.json();
            processOptionChainMatrix(payload);
            logger.textContent = `Refresh Complete: ${new Date().toLocaleTimeString()}`;
        } catch (fault) {
            console.error(fault);
            logger.textContent = "Connection Refused. Retry in a few moments (NSE periodically throttles aggressive requests).";
        }
    }

    function processOptionChainMatrix(dataset) {
        if (!dataset || !dataset.records) return;

        const spotIndexPrice = dataset.records.underlyingValue;
        const proximateExpiry = dataset.records.expiryDates[0];
        
        // Match standard Nifty 50-point strike increments
        const targetedATM = Math.round(spotIndexPrice / 50) * 50;

        let selectedCE = null;
        let selectedPE = null;

        // Loop array matrix to isolate specific ATM option keys
        for (const record of dataset.records.data) {
            if (record.expiryDate === proximateExpiry && record.strikePrice === targetedATM) {
                selectedCE = record.CE;
                selectedPE = record.PE;
                break;
            }
        }

        if (selectedCE && selectedPE) {
            compileAndRenderRow({
                spot: spotIndexPrice,
                atm: targetedATM,
                ceLtp: selectedCE.lastPrice,
                peLtp: selectedPE.lastPrice,
                ceTotalOI: selectedCE.openInterest,
                peTotalOI: selectedPE.openInterest
            });
        }
    }

    function compileAndRenderRow(currentMetrics) {
        const displayContainer = document.getElementById('trackerLogs');
        const wallClockTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        
        let dynamicCeOIChg = 0;
        let dynamicPeOIChg = 0;

        // Extract interval differences if baseline exists
        if (historicalSnapshot) {
            dynamicCeOIChg = currentMetrics.ceTotalOI - historicalSnapshot.ceTotalOI;
            dynamicPeOIChg = currentMetrics.peTotalOI - historicalSnapshot.peTotalOI;
        }

        const aggregateNetOI = dynamicCeOIChg - dynamicPeOIChg;
        
        // Institutional Reading: Call accumulation = resistance, Put accumulation = support
        let sentimentText = "Neutral";
        let colorProfile = "neutral";
        
        if (dynamicCeOIChg !== 0 || dynamicPeOIChg !== 0) {
            sentimentText = aggregateNetOI > 0 ? "Bearish (Call Writing)" : "Bullish (Put Writing)";
            colorProfile = aggregateNetOI > 0 ? "bearish" : "bullish";
        }

        const dataRow = document.createElement('tr');
        dataRow.innerHTML = `
            <td>${wallClockTime}</td>
            <td>${currentMetrics.spot.toFixed(2)}</td>
            <td><span class="atm-strike">${currentMetrics.atm}</span></td>
            <td>₹${currentMetrics.ceLtp.toFixed(2)}</td>
            <td>₹${currentMetrics.peLtp.toFixed(2)}</td>
            <td class="${dynamicCeOIChg >= 0 ? 'bearish' : 'bullish'}">${dynamicCeOIChg >= 0 ? '+' : ''}${dynamicCeOIChg.toLocaleString()}</td>
            <td class="${dynamicPeOIChg >= 0 ? 'bullish' : 'bearish'}">${dynamicPeOIChg >= 0 ? '+' : ''}${dynamicPeOIChg.toLocaleString()}</td>
            <td class="${colorProfile}">${aggregateNetOI >= 0 ? '+' : ''}${aggregateNetOI.toLocaleString()}</td>
            <td class="${colorProfile}">${sentimentText}</td>
        `;

        // Push new data records to the top of the mobile viewing table
        displayContainer.insertBefore(dataRow, displayContainer.firstChild);
        
        // Cache current metrics state to reference for the next delta step
        historicalSnapshot = currentMetrics;
    }

    function coordinateExecutionIntervals() {
        if (backgroundLoop) clearInterval(backgroundLoop);
        const cycleInterval = parseInt(document.getElementById('intervalSelect').value);
        backgroundLoop = setInterval(executeScannerPipeline, cycleInterval * 60 * 1000);
    }

    // Initialize triggers on initial boot up
    coordinateExecutionIntervals();
    executeScannerPipeline();
</script>

</body>
</html>
